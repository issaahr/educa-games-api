spring.application.name=educagames-api

# ConfiguraÁıes do banco de dados com vari·veis de ambiente
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:educagames-db}
spring.datasource.username=${DB_USER:educagames}
spring.datasource.password=${DB_PASSWORD:educapass}

# ConfiguraÁıes JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Logging
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.com.educagames=WARN
