spring.application.name=educagames-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Configurações do banco de dados com variáveis de ambiente
spring.datasource.url=${CONNECTION_STRING}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# APP
app.frontend.url=${FRONTEND_URL}
app.logo.public-url=${LOGO_URL}
app.invite.signup-token-expiration-hours=${SIGNUP_TOKEN_EXPIRATION}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Datasource Pool
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=540000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=20000

# Storage
storage.url=${STORAGE_URL}
storage.bucket=${STORAGE_BUCKET}
storage.key=${STORAGE_KEY}
storage.lesson_bucket=${STORAGE_LESSON_BUCKET}

# Admin user for seeding
admin.password=${ADMIN_PASSWORD}

# Email - Remetente
app.mail.from=${MAIL_FROM}
app.mail.from-name=${MAIL_FROM_NAME}

# Email - API KEY por motivos de compatibilidade com o ambiente de deploy
app.email.api-key=${EMAIL_API_KEY}

# Email - Configurações do servidor SMTP para usar no Mailhog
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
