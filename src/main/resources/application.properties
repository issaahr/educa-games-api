spring.application.name=educagames-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Desativa a criação automática de um usuário padrão pelo Spring Security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Configurações do banco de dados com variáveis de ambiente
spring.datasource.url=${CONNECTION_STRING}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Configurações JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# APP
app.frontend.url=${FRONTEND_URL}
app.logo.public-url=${LOGO_URL}
app.invite.signup-token-expiration-hours=${SIGNUP_TOKEN_EXPIRATION}

# Instructor emails for seeding
instructor.emails=${INSTRUCTOR_EMAILS}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Email - Remetente
app.mail.from=${MAIL_FROM}
app.mail.from-name=${MAIL_FROM_NAME}

# Email - API KEY por motivos de compatibilidade com o ambiente de deploy
app.email.api-key=${EMAIL_API_KEY}

# Email - Configurações do servidor SMTP para usar no Mailhog
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
