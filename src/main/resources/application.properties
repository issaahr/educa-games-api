spring.application.name=educagames-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Desativa a criação automática de um usuário padrão pelo Spring Security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Configurações do banco de dados com variáveis de ambiente
spring.datasource.url=${CONNECTION_STRING}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# EMAIL
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_PASSWORD}
app.mail.from-name=${MAIL_FROM_NAME}
app.mail.from=${MAIL_FROM}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Adiciona confiança no certificado TLS mesmo com SAN ausente
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false

# Configurações JPA (mover overrides por perfil para application-*.properties)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# APP
app.frontend.url=${FRONTEND_URL}
app.logo.public-url=${LOGO_URL}
app.invite.signup-token-expiration-hours=${SIGNUP_TOKEN_EXPIRATION}

# Instructor emails for seeding
instructor.emails=${INSTRUCTOR_EMAILS}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

