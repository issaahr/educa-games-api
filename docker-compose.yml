version: '3.8'

services:
  educa-games-api:
    build: .
    container_name: educa-games-api
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      - educa-games-postgres
    networks:
      - educa-games-network
    restart: unless-stopped

  educa-games-postgres:
    image: postgres:15-alpine
    container_name: educa-games-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - educa-games-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  educa-games-network:
    driver: bridge
