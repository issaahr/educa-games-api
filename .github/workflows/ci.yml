name: CI - EducaGames API

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and start containers
        run: |
          docker compose up -d --build
          docker exec educa-games-api chmod +x ./gradlew
      
      - name: Set Gradle memory limits
        run: docker exec educa-games-api sh -c 'export GRADLE_OPTS="-Xmx1024m -XX:MaxMetaspaceSize=512m"'
      
      - name: Fix checkstyle line endings
        run: docker exec educa-games-api sh -c "apk add --no-cache dos2unix && dos2unix /app/config/checkstyle/checkstyle.xml"
      
      - name: Format code with Spotless
        run: docker exec educa-games-api sh -c "GRADLE_OPTS='-Xmx1024m' ./gradlew spotlessApply --no-daemon"
      
      - name: Build project
        run: docker exec educa-games-api sh -c "GRADLE_OPTS='-Xmx1024m' ./gradlew build -x test --no-daemon"
      
      - name: Check code quality with Checkstyle
        run: docker exec educa-games-api sh -c "./gradlew checkstyleMain --no-daemon"
      
      - name: Stop containers
        if: always()
        run: docker compose down
